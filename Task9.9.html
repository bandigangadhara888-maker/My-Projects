<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Fake Store</title>
    <link rel="stylesheet" href="Task9.9.css">
</head>
<body>

    <header>
        <h1>🛒 Mini Fake Store</h1>

        <input
            type="text"
            id="search"
            placeholder="Search products..."
        >

        <select id="category">
            <option value="all">All Categories</option>
        </select>
    </header>

    <main>
        <div id="products" class="products"></div>

        <aside class="cart">
            <h2>Cart</h2>
            <div id="cartItems"></div>

            <h3>Total: $<span id="total">0</span></h3>
        </aside>
    </main>

    <script src="./Task9.9.js"></script>
</body>
</html>
